plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.ragbaarnet.platform'
    compileSdk 34

    defaultConfig {
        applicationId 'com.ragbaarnet.platform'
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        // IMPORTANT: set this to your laptop IP on the same Wi‑Fi/LAN.
        // Example: "http://192.168.1.12:5000/ui/"
        buildConfigField "String", "SERVER_URL", "\"http://192.168.1.100:5000/ui/\""
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'androidx.appcompat:appcompat:1.7.0'
}
